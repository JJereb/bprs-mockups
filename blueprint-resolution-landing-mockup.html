document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2Fcircle><text x=\"24\" y=\"35.5\" text-anchor=\"middle\" font-size=\"14\" font-family=\"IBM Plex Mono,monospace\" stroke=\"none\" fill=\"currentColor\">$<\u002Ftext><\u002Fsymbol><symbol id=\"s-scrib\" viewBox=\"0 0 48 60\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 14c10-7 22 9 33 1M9 30c12 9 18-7 31 5M12 46c8-2 18 4 25-1\"><\u002Fpath><\u002Fsymbol><\u002Fdefs><\u002Fsvg><div class=\"bar\"><a class=\"brand\" href=\"#review\"><img class=\"brandlogo\" src=\"97fb474e-a22c-4ac3-82ed-512662756bbc\" alt=\"Blueprint Resolution Services\"><\u002Fa><div class=\"barr\"><a class=\"barph mono\" href=\"tel:+18005550143\">(800) 555-0143<\u002Fa><a class=\"btn btn-primary btn-sm\" href=\"#review\">Free Case Review<\u002Fa><\u002Fdiv><\u002Fdiv><div class=\"herowrap\"><div class=\"bp-field\"><svg class=\"bp-warp\" xmlns=\"http://www.w3.org/2000/svg\"><\u002Fsvg><\u002Fdiv><div class=\"fade-edge\"><\u002Fdiv><div class=\"hero {{ heroSide }}\"><div class=\"hcopy\"><div class=\"eyebrow\">IRS Tax Resolution<\u002Fdiv><h1 class=\"h1\">{{ headline }}<\u002Fh1><p class=\"lead\">Licensed Enrolled Agents represent you before the IRS — handling the notices, the calls, and the paperwork — so you can stop losing sleep over back taxes.<\u002Fp><div class=\"contactrow\"><div><div class=\"phlabel\">Speak with a tax professional<\u002Fdiv><a class=\"phone mono\" href=\"tel:+18005550143\"><span class=\"mark\" style=\"width:16px;height:16px\"><\u002Fspan>(800) 555-0143<\u002Fa><\u002Fdiv><div class=\"addr\">Blueprint Financial Services LLC<br>1200 Blueprint Way, Suite 300<br>Austin, TX 78701<\u002Fdiv><\u002Fdiv><div class=\"disc\"><span class=\"di\"><\u002Fspan>We are a private company and are not affiliated with the IRS or any government agency.<\u002Fdiv><div class=\"badges\"><div class=\"badge\"><span class=\"bm\">BBB<\u002Fspan><div><b>Accredited<\u002Fb><span>Better Business Bureau<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"badge\"><span class=\"bm\">EA<\u002Fspan><div><b>Enrolled Agents<\u002Fb><span>On staff<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"badge\"><span class=\"bm\">NAEA<\u002Fspan><div><b>Member<\u002Fb><span>Natl. Assn. of EAs<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"hform\" id=\"review\"><div class=\"card\"><sc-if value=\"{{ notDone }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"cardhd\"><b>Free IRS Case Review<\u002Fb><span class=\"stepl mono\">{{ stepText }}<\u002Fspan><\u002Fdiv><div class=\"prog\"><i style=\"{{ progStyle }}\"><\u002Fi><\u002Fdiv><sc-if value=\"{{ isS1 }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"field\"><p class=\"q\">What's your name?<\u002Fp><p class=\"qsub\">We'll use this when a tax professional reaches out.<\u002Fp><input type=\"text\" placeholder=\"Full name\" value=\"{{ data.name }}\" oninput=\"{{ onName }}\"><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isS2 }}\"><div class=\"field\"><p class=\"q\">Where can we email you?<\u002Fp><p class=\"qsub\">For your case summary — no spam, ever.<\u002Fp><input type=\"email\" placeholder=\"you@email.com\" value=\"{{ data.email }}\" oninput=\"{{ onEmail }}\"><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isS3 }}\"><div class=\"field\"><p class=\"q\">Best phone number to reach you?<\u002Fp><p class=\"qsub\">A real person will call — never an auto-dialer.<\u002Fp><input type=\"tel\" placeholder=\"(555) 555-5555\" value=\"{{ data.phone }}\" oninput=\"{{ onPhone }}\"><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isS4 }}\"><div class=\"field\"><p class=\"q\">About how much do you owe the IRS?<\u002Fp><p class=\"qsub\">A rough range is fine — it helps us prepare.<\u002Fp><div class=\"opts\"><sc-for list=\"{{ amountOpts }}\" as=\"o\" hint-placeholder-count=\"5\"><button class=\"{{ o.cls }}\" onclick=\"{{ o.onClick }}\"><span class=\"od\"><\u002Fspan>{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isS5 }}\"><div class=\"field\"><p class=\"q\">When's the best time to call?<\u002Fp><p class=\"qsub\">We'll work around your schedule.<\u002Fp><div class=\"opts\"><sc-for list=\"{{ timeOpts }}\" as=\"o\" hint-placeholder-count=\"3\"><button class=\"{{ o.cls }}\" onclick=\"{{ o.onClick }}\"><span class=\"od\"><\u002Fspan>{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv><\u002Fsc-if><div class=\"nav\"><sc-if value=\"{{ showBack }}\"><button class=\"btn btn-ghost\" onclick=\"{{ back }}\">Back<\u002Fbutton><\u002Fsc-if><sc-if value=\"{{ isS5 }}\"><button class=\"btn btn-primary\" onclick=\"{{ submit }}\" disabled=\"{{ disabledNext }}\">Request my review<\u002Fbutton><\u002Fsc-if><sc-if value=\"{{ notLast }}\"><button class=\"btn btn-primary\" onclick=\"{{ next }}\" disabled=\"{{ disabledNext }}\">Continue<\u002Fbutton><\u002Fsc-if><\u002Fdiv><div class=\"trustline mono\"><span class=\"di\" style=\"width:6px;height:6px;background:var(--accent);transform:rotate(45deg);display:inline-block\"><\u002Fspan>Free &amp; confidential. No obligation.<\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ done }}\"><div class=\"done\"><div class=\"dcheck\"><svg class=\"chk\" viewBox=\"0 0 24 24\"><path d=\"M5 13l4 4L19 7\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Request received<\u002Fh3><p class=\"dt\">Your blueprint is taking shape, {{ firstName }}.<\u002Fp><p>A licensed Enrolled Agent will review your case and call you {{ timeShort }}. There's no cost and no obligation for your review.<\u002Fp><div class=\"summary\"><div><span>Name<\u002Fspan><b>{{ data.name }}<\u002Fb><\u002Fdiv><div><span>Email<\u002Fspan><b>{{ data.email }}<\u002Fb><\u002Fdiv><div><span>Phone<\u002Fspan><b>{{ data.phone }}<\u002Fb><\u002Fdiv><div><span>Amount owed<\u002Fspan><b>{{ data.amount }}<\u002Fb><\u002Fdiv><div><span>Best time<\u002Fspan><b>{{ data.time }}<\u002Fb><\u002Fdiv><\u002Fdiv><button class=\"btn btn-ghost\" style=\"width:100%;justify-content:center\" onclick=\"{{ restart }}\">Start over<\u002Fbutton><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"sec\"><div class=\"sech\"><div class=\"kicker\">What we do<\u002Fdiv><h2 class=\"h2\">IRS representation, end to end<\u002Fh2><p>We don't promise to erase your debt. We put a credentialed professional between you and the IRS and pursue the best resolution your circumstances allow.<\u002Fp><\u002Fdiv><div class=\"grid3\"><sc-for list=\"{{ services }}\" as=\"s\" hint-placeholder-count=\"6\"><div class=\"svc\"><div class=\"svcic\"><svg class=\"svgi\" viewBox=\"0 0 48 60\"><use href=\"{{ s.sym }}\"><\u002Fuse><\u002Fsvg><\u002Fdiv><h3>{{ s.t }}<\u002Fh3><p>{{ s.d }}<\u002Fp><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv><div class=\"sec\" style=\"padding-top:0\"><div class=\"sech\"><div class=\"kicker\">How it works<\u002Fdiv><h2 class=\"h2\">Four steps to a resolution<\u002Fh2><\u002Fdiv><div class=\"proc\"><sc-for list=\"{{ steps }}\" as=\"p\" hint-placeholder-count=\"4\"><div class=\"pstep\"><div class=\"pn\">{{ p.n }}<\u002Fdiv><h4>{{ p.t }}<\u002Fh4><p>{{ p.d }}<\u002Fp><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv><div class=\"feewrap\"><div class=\"feepanel\"><div><div class=\"kicker\">Transparent pricing<\u002Fdiv><h3>Flat fees, quoted up front.<\u002Fh3><p>We charge a single flat fee based on the complexity of your case — never a percentage of what you owe, and never a surprise. You'll know the full price before you decide to move forward.<\u002Fp><div class=\"feepts\"><div class=\"feept\"><span class=\"fk\"><\u002Fspan>Free case review before any fee is quoted.<\u002Fdiv><div class=\"feept\"><span class=\"fk\"><\u002Fspan>One flat fee, scoped to your specific situation.<\u002Fdiv><div class=\"feept\"><span class=\"fk\"><\u002Fspan>No percentage-of-savings or hidden monthly charges.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"legal\"><b>Important disclosures.<\u002Fb> Results may vary based on your individual financial circumstances and the determinations of the IRS. We do not guarantee any particular outcome, reduction, settlement, or resolution of your tax liability. Not all applicants qualify for every program, including Offers in Compromise. Engaging professional representation does not stop interest or penalties from accruing on unpaid balances. The information on this page is general and is not tax or legal advice for your specific situation.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"footer\"><div class=\"fgrid\"><div class=\"fco\"><b>BLUEPRINT FINANCIAL SERVICES LLC<\u002Fb><div class=\"ftxt\">1200 Blueprint Way, Suite 300<br>Austin, TX 78701<br><br><a class=\"barph\" href=\"tel:+18005550143\" style=\"font-size:15px\">(800) 555-0143<\u002Fa><br>help@blueprintresolution.com<\u002Fdiv><\u002Fdiv><div class=\"fco\"><p class=\"fh\">Services<\u002Fp><a class=\"flink\" href=\"#\">Audit Representation<\u002Fa><a class=\"flink\" href=\"#\">Back Taxes &amp; Filing<\u002Fa><a class=\"flink\" href=\"#\">Liens &amp; Levies<\u002Fa><a class=\"flink\" href=\"#\">Offer in Compromise<\u002Fa><a class=\"flink\" href=\"#\">Payment Plans<\u002Fa><\u002Fdiv><div class=\"fco\"><p class=\"fh\">Company<\u002Fp><a class=\"flink\" href=\"#\">Privacy Policy<\u002Fa><a class=\"flink\" href=\"#\">Terms of Service<\u002Fa><a class=\"flink\" href=\"#\">Fee Schedule<\u002Fa><a class=\"flink\" href=\"#\">Contact Us<\u002Fa><\u002Fdiv><div class=\"fco\"><p class=\"fh\">Credentials<\u002Fp><div class=\"ftxt\">Staffed by IRS Enrolled Agents, federally licensed to represent taxpayers before the IRS in all 50 states.<br><br>Member, National Association of Enrolled Agents.<br>State registration #PLACEHOLDER-0000.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"legalbar\">We are a private company and are not affiliated with the IRS or any government agency. Blueprint Financial Services LLC provides tax representation services and does not provide legal advice. Results may vary; we do not guarantee any specific outcome. © 2026 Blueprint Financial Services LLC. All rights reserved.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:960},&quot;headline&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Professional IRS Representation&quot;,&quot;Resolve Your IRS Tax Problems&quot;,&quot;Licensed IRS Representation, Done For You&quot;],&quot;default&quot;:&quot;Professional IRS Representation&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E8B04B&quot;,&quot;options&quot;:[&quot;#E8B04B&quot;,&quot;#6FD3E8&quot;,&quot;#F2784B&quot;,&quot;#FFFFFF&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;bgShade&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:9,&quot;min&quot;:0,&quot;max&quot;:20,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;formSide&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;right&quot;,&quot;left&quot;],&quot;default&quot;:&quot;right&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;animIntensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:7,&quot;min&quot;:1,&quot;max&quot;:10,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Animation&quot;}}\">\nclass Component extends DCLogic {\n  constructor(p){\n    super(p);\n    this.state={step:1,done:false,data:{name:'',email:'',phone:'',amount:'',time:''}};\n    this.total=5;\n  }\n  componentDidMount(){this.fieldEl=document.querySelector('.bp-field');this.svg=this.fieldEl&&this.fieldEl.querySelector('.bp-warp');this.curOrg=0;this.buildLines();this.applyOrg(0);this._onResize=()=>{clearTimeout(this._rz);this._rz=setTimeout(()=>{this.buildLines();this.applyOrg(this.curOrg);},250);};window.addEventListener('resize',this._onResize);}\n  componentWillUnmount(){if(this._onResize)window.removeEventListener('resize',this._onResize);}\n  buildLines(){\n    const el=this.fieldEl, svg=this.svg; if(!el||!svg)return;\n    const r=el.getBoundingClientRect();\n    const W=Math.max(360,Math.ceil(r.width)), H=Math.max(320,Math.ceil(r.height));\n    svg.setAttribute('width',W); svg.setAttribute('height',H);\n    while(svg.firstChild) svg.removeChild(svg.firstChild);\n    const NS='http://www.w3.org/2000/svg', intensity=(this.props.animIntensity??7)/7;\n    let s=99173; const rnd=()=>{s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};\n    const minor=34, major=170, lines=[];\n    const mk=(x1,y1,x2,y2,cx,cy,maj)=>{\n      const ln=document.createElementNS(NS,'line');\n      ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);\n      ln.setAttribute('class',maj?'gl gl-maj':'gl');\n      ln.style.transformOrigin=cx+'px '+cy+'px';\n      svg.appendChild(ln);\n      lines.push({el:ln,mx:(rnd()*2-1)*210*intensity,my:(rnd()*2-1)*150*intensity,mr:(rnd()*2-1)*40*intensity,maj});\n    };\n    const OX=40, OY=40;\n    for(let x=OX%minor-minor;x<=W+40;x+=minor) mk(x,-40,x,H+40,x,H/2,(((x-OX)%major)+major)%major===0);\n    for(let y=OY%minor-minor;y<=H+40;y+=minor) mk(-40,y,W+40,y,W/2,y,(((y-OY)%major)+major)%major===0);\n    this.lines=lines;\n  }\n  orgFor(step,done){return done?1:(step-1)/this.total;}\n  applyOrg(org){const ls=this.lines; if(!ls)return; const k=1-org;\n    for(const o of ls){o.el.style.transform=`translate(${(o.mx*k).toFixed(1)}px,${(o.my*k).toFixed(1)}px) rotate(${(o.mr*k).toFixed(2)}deg)`;o.el.style.opacity=((o.maj?0.4:0.26)+(o.maj?0.45:0.4)*org).toFixed(3);}\n    this.curOrg=org;}\n  animateTo(target){this.applyOrg(target);}\n  set(k,v){this.setState(s=>({data:{...s.data,[k]:v}}));}\n  next(){if(!this.canNext())return;const ns=Math.min(this.total,this.state.step+1);this.setState({step:ns});this.applyOrg(this.orgFor(ns,false));}\n  back(){const ns=Math.max(1,this.state.step-1);this.setState({step:ns});this.applyOrg(this.orgFor(ns,false));}\n  submit(){if(!this.canNext())return;this.setState({done:true});this.applyOrg(1);}\n  restart(){this.setState({step:1,done:false,data:{name:'',email:'',phone:'',amount:'',time:''}});this.applyOrg(0);}\n  canNext(){const d=this.state.data,st=this.state.step;\n    return st===1?!!d.name.trim():st===2?/.+@.+\\..+/.test(d.email):st===3?d.phone.replace(/\\D/g,'').length>=7:st===4?!!d.amount:st===5?!!d.time:false;}\n  renderVals(){\n    const {step,data,done}=this.state, total=this.total;\n    const heads=['Professional IRS Representation','Resolve Your IRS Tax Problems','Licensed IRS Representation, Done For You'];\n    const headline=this.props.headline||heads[0];\n    const accent=this.props.accent||'#E8B04B';\n    const shade=this.props.bgShade??9;\n    const bg=`hsl(213 70% ${(26-shade*0.62).toFixed(1)}%)`;\n    const side=this.props.formSide||'right';\n    const amounts=['Less than $10,000','$10,000 – $25,000','$25,000 – $50,000','$50,000 – $100,000','More than $100,000'];\n    const times=['Morning (8am – 12pm)','Afternoon (12pm – 5pm)','Evening (5pm – 8pm)'];\n    const amountOpts=amounts.map(a=>({label:a,cls:'opt'+(data.amount===a?' sel':''),onClick:()=>this.set('amount',a)}));\n    const timeOpts=times.map(t=>({label:t,cls:'opt'+(data.time===t?' sel':''),onClick:()=>this.set('time',t)}));\n    const services=[\n      {sym:'#s-form',t:'Audit Representation',d:'We stand in for you during IRS examinations and handle all correspondence with the IRS on your behalf.'},\n      {sym:'#s-doc',t:'Back Taxes & Unfiled Returns',d:'We prepare and file delinquent returns to bring your account back into good standing.'},\n      {sym:'#s-env',t:'IRS Liens & Levies',d:'We respond to federal tax liens and bank or wage levies and work to release them where possible.'},\n      {sym:'#s-coin',t:'Offer in Compromise',d:'We assess your eligibility and prepare an Offer in Compromise to settle for less than the full balance when you qualify.'},\n      {sym:'#s-calc',t:'Installment Agreements',d:'We negotiate a manageable monthly payment plan with the IRS based on what you can realistically afford.'},\n      {sym:'#s-rcpt',t:'Penalty Abatement',d:'We request removal or reduction of penalties when reasonable cause applies to your situation.'}\n    ];\n    const steps=[\n      {n:'01',t:'Free case review',d:'Tell us about your IRS situation. We review your notices and account transcripts at no cost.'},\n      {n:'02',t:'Flat-fee quote',d:'You receive a clear, upfront flat fee based on the complexity of your case — no surprises.'},\n      {n:'03',t:'We represent you',d:'A licensed Enrolled Agent files a power of attorney and deals with the IRS directly.'},\n      {n:'04',t:'Resolution',d:'We pursue the best available outcome and keep you informed at every step.'}\n    ];\n    const firstName=(data.name||'').trim().split(/\\s+/)[0]||'there';\n    const timeShort=(data.time||'soon').replace(/\\s*\\(.*\\)/,'').toLowerCase();\n    return {\n      rootStyle:{'--accent':accent,'--bp-bg':bg},\n      progStyle:{width:(done?100:(step-1)/total*100)+'%'},\n      headline, heroSide:side==='left'?'sidleft':'sidright',\n      data, done, notDone:!done,\n      stepText:'STEP '+step+' / '+total,\n      isS1:step===1&&!done,isS2:step===2,isS3:step===3,isS4:step===4,isS5:step===5&&!done,\n      showBack:step>1&&!done, notLast:step<total,\n      disabledNext:!this.canNext(),\n      onName:e=>this.set('name',e.target.value),\n      onEmail:e=>this.set('email',e.target.value),\n      onPhone:e=>this.set('phone',e.target.value),\n      amountOpts, timeOpts, services, steps,\n      firstName, timeShort,\n      next:()=>this.next(), back:()=>this.back(), submit:()=>this.submit(), restart:()=>this.restart()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
